name: Build and Deploy Production Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: sub2api
  DEPLOY_DIR: /opt/sub2api
  HEALTH_URL: https://api.bupt8.com/health

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          image="ghcr.io/${owner}/${IMAGE_NAME}"
          tag="sha-${short_sha}"
          version="main-${short_sha}"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "ref=${image}:${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.image }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Check required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }

      - name: Write SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Trust VPS host key
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${VPS_PORT:-22}"
          ssh-keyscan -p "$port" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy image on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.ref }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          port="${VPS_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$port" "$VPS_USER@$VPS_HOST" \
            GHCR_USERNAME="$GHCR_USERNAME" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            IMAGE_REF="$IMAGE_REF" \
            DEPLOY_DIR="$DEPLOY_DIR" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          cp docker-compose.yml "docker-compose.yml.bak.$(date +%Y%m%d%H%M%S)"

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          IMAGE_REF="$IMAGE_REF" perl -0pi -e 's#image:\s*\S+/sub2api:\S+#image: $ENV{IMAGE_REF}#' docker-compose.yml
          docker compose pull sub2api
          docker compose up -d sub2api

          for i in $(seq 1 60); do
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' sub2api 2>/dev/null || true)"
            if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
              break
            fi
            sleep 2
          done

          docker compose ps
          curl -fsS http://127.0.0.1:8080/health
          REMOTE

      - name: Verify public health endpoint
        shell: bash
        run: curl -fsS "$HEALTH_URL"
